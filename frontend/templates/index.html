<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Weather Monitoring System</title>
	<link rel="stylesheet" href="../static/styles.css">
</head>
<body>

<div class="container">

	<div class="sidebar">
		<ul>
			<li><a href="#">Weather</a></li>
			<li><a href="#">Cities</a></li>
			<li><a href="#">Settings</a></li>
		</ul>
	</div>

	<div class="main">
		<div class="header">
			<h1>Weather Monitoring System</h1>
		</div>

        <div class="current-weather">
            <div>
                <h2>Location</h2>
                <h1 id="main_temp">__ C</h1>
            </div>
        </div>

        <div class="sensor-cards">

            <div class="card">
                <h2>Temperature</h2>
                <p id="temperature">__ C</p>
            </div>

            <div class="card">
                <h2>Humidity</h2>
                <p id="humidity">__ %</p>
            </div>

            <div class="card">
                <h2>Pressure</h2>
                <p id="pressure">__ hPa</p>
            </div>

        </div>
	</div>
</div>
</body>
</html>
